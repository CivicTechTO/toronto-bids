# --- corrupt: a trailing '.25.' the feed appends to an otherwise clean figure -------------
#
# Five strings share the shape <amount>.25. — e.g. '960128.38' + '.25.'. The leading figure is
# legible, but what '.25.' is (a rate? a fraction? a truncated second field?) is not, and
# taking the prefix would be inventing a rule from five samples.

["960128.38.25."]
